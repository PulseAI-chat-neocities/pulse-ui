<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neurai</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Menü gomb -->
<button id="menuButton" class="menu-button">
  <span></span>
  <span></span>
  <span></span>
</button>

<!-- Oldalsó menü -->
<div id="sidebarOverlay" class="sidebar-overlay">
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h3>Beszélgetések</h3>
      <button id="newChat" class="new-chat">+ Új chat</button>
    </div>

    <div id="chatList" class="chat-list"></div>
  </aside>
</div>

<!-- A chat tartalma -->
<div id="chatContainer" class="chat-container"></div>

  <div class="neurai-ui">
    <header class="neurai-header">
      <h1>Neurai</h1>
      <p class="subtitle">Your AI assistant</p>
    </header>

    <main class="neurai-chat" id="chat">
      <div class="chat-bubble ai">
        Hello 👋<br>
        I am Neurai, what can I help you with?
      </div>
    </main>

    <footer class="neurai-input">
      <input type="text" placeholder="Tell me something..." class="input-field" id="input">
      <button class="send-btn" id="send">Send</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
