<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="pulse-ui">
    <header class="pulse-header">
      <img src="pulse-logo.png" alt="Pulse Logo" class="pulse-logo">
      <h1>Pulse</h1>
      <p class="subtitle">Your AI-assistent</p>
    </header>

    <main class="pulse-chat" id="chat">
      <div class="chat-bubble ai">
        Hello 👋<br>
        I am Pulse, what can I help you with?
      </div>
    </main>

    <footer class="pulse-input">
      <input type="text" placeholder="Tell me something..." class="input-field" id="input">
      <button class="send-btn" id="send">Send</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
