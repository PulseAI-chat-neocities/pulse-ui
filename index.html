<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neurai</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="menuButton" class="menu-button">
  <span></span>
  <span></span>
  <span></span>
</button>

<div id="sidebarOverlay" class="sidebar-overlay">
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h3>Chats</h3>
      <button id="newChat" class="new-chat">+ New Chat</button>
    </div>

    <div id="chatList" class="chat-list">
      <button class="chat-item active">First chat</button>
      <button class="chat-item">Prompt ideas</button>
      <button class="chat-item">Neurai developments</button>
    </div>
  </aside>
</div>

  <div class="neurai-ui">
    <header class="neurai-header">
      <h1>Neurai</h1>
      <p class="subtitle">Your AI assistant</p>
    </header>

    <main class="neurai-chat" id="chat">
      <div class="chat-bubble ai">
        Hello 👋<br>
        I am Neurai, what can I help you with?
      </div>
    </main>

    <footer class="neurai-input">
      <input type="text" placeholder="Tell me something..." class="input-field" id="input">
      <button class="send-btn" id="send">Send</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
